<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Venus</title>
  <link rel="icon" href="favicon.png" />
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0C0C25;
      color: #FAFAFA;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      text-align: center;
      padding: 24px;
    }
    .card { max-width: 420px; width: 100%; }
    img.logo { width: 200px; height: auto; }
    h1 { font-size: 2.4rem; letter-spacing: .5px; margin-top: 8px; }
    p.sub { color: #C9C9E0; margin-top: 8px; font-size: 1.05rem; }
    .btn {
      display: inline-block;
      margin-top: 28px;
      padding: 14px 26px;
      border-radius: 14px;
      font-weight: 600;
      text-decoration: none;
      color: #0C0C25;
      background: linear-gradient(135deg, #FFD8B0, #FCB69F 60%, #FF7A59);
    }
    .btn.secondary {
      margin-left: 8px;
      color: #FAFAFA;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.14);
    }
    code {
      display: block;
      margin-top: 20px;
      padding: 12px 14px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 10px;
      font-size: .85rem;
      color: #C9C9E0;
      word-break: break-all;
    }
    footer { margin-top: 28px; color: #6C6C8A; font-size: .8rem; }
    a.link { color: #FCB69F; }
  </style>
</head>
<body>
  <div class="card">
    <img class="logo" src="logo.png" alt="Venus" />
    <h1>Venus</h1>
    <p class="sub">App pessoal para iOS. Instale pela AltStore.</p>

    <div>
      <a class="btn" href="altstore://source?url=https://joseluizfranco.github.io/venus/source.json">Adicionar à AltStore</a>
      <a class="btn secondary" href="sidestore://source?url=https://joseluizfranco.github.io/venus/source.json">SideStore</a>
    </div>

    <p class="sub" style="margin-top:22px;font-size:.9rem">Ou adicione a source manualmente com esta URL:</p>
    <code>https://joseluizfranco.github.io/venus/source.json</code>

    <footer>
      <a class="link" href="https://altstore.io">altstore.io</a> ·
      <a class="link" href="https://github.com/JoseLuizFranco/venus">código-fonte</a>
    </footer>
  </div>
</body>
</html>
